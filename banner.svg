<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300">
  <defs>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.9" numOctaves="1" result="noise"/>
      <feOffset in="SourceGraphic" dx="2" dy="0" result="offset1"/>
      <feOffset in="SourceGraphic" dx="-2" dy="0" result="offset2"/>
      <feBlend in="offset1" in2="offset2" mode="screen"/>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="1000" y2="0" stroke="#00FFCC" stroke-width="0.5" opacity="0.1"/>
      <line x1="0" y1="2" x2="1000" y2="2" stroke="#FF007F" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  
  <rect width="1000" height="300" fill="#0D0F14"/>
  <rect width="1000" height="300" fill="url(#scanlines)"/>

  <text x="20" y="40" fill="#00FFAA" opacity="0.3" font-family="monospace" font-size="12">01001110 01100101 01101111 01101110</text>
  <text x="300" y="70" fill="#00FFAA" opacity="0.2" font-family="monospace" font-size="10">0x7F 0x34 0xAB 0x11 0xFF</text>
  <text x="650" y="90" fill="#FF007F" opacity="0.25" font-family="monospace" font-size="11">$> ./anime_devcore.sh --run</text>

  <text x="50" y="180" fill="#00FFCC" font-family="'Courier New', monospace" font-size="46" font-weight="bold" filter="url(#glitch)">&lt;SYSTEM::USER&gt;</text>
  <text x="50" y="230" fill="#FF007F" font-family="'Courier New', monospace" font-size="18">[Lofi Hacker Mode] : Devcore // Anime Core Activated</text>
  <text x="50" y="260" fill="#E0E0FF" font-family="monospace" font-size="12">$> cat /sys/status | grep "cool_factor" -> ∞</text>

  <rect x="380" y="195" width="3" height="36" fill="#00FFCC">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
